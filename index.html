
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mbappe</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }

        header {
            background-color: #4a76a8;
            padding: 15px 0;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            align-items: center;
        }

        button[data-group] {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #6c9bc0;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button[data-group]:hover {
            background-color: #5a8bb3;
        }

        main {
            max-width: 800px;
            margin: 30px auto;
            background-color: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .page {
            display: none;
            padding: 20px;
        }

        .page.show {
            display: block;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        #page-1 {
            text-align: center;
            font-size: 18px;
        }

        .todo-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        #todo-input {
            padding: 12px;
            width: 100%;
            max-width: 400px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
        }

        #todo-add-btn {
            padding: 12px 24px;
            background-color: #4a76a8;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s ease;
        }

        #todo-add-btn:hover {
            background-color: #3a6592;
        }

        #todo-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .todo-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background-color: #f9f9f9;
            border-left: 4px solid #6c9bc0;
            margin-bottom: 8px;
            border-radius: 0 4px 4px 0;
            animation: fadeIn 0.3s ease-in;
        }

        .todo-delete-btn {
            padding: 5px 10px;
            background-color: #ff4757;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.2s;
        }

        .todo-delete-btn:hover {
            background-color: #e04040;
        }

        #page-3 {
            text-align: center;
            font-style: italic;
            color: #666;
            font-size: 18px;
        }

        #api-result {
            margin-top: 20px;
            padding: 15px;
            background-color: #f9f9f9;
            border-left: 4px solid #4a76a8;
            text-align: left;
            white-space: pre-wrap;
            word-break: break-all;
        }

        #fetch-button {
            padding: 12px 24px;
            background-color: #4a76a8;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s ease;
        }

        #fetch-button:hover {
            background-color: #3a6592;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <button data-group=".page" data-target="page-1">О себе</button>
            <button data-group=".page" data-target="page-2">Что нибуть</button>
            <button data-group=".page" data-target="page-3">Работы с API</button>
        </nav>
    </header>
    <main>
        <div class="page show" id="page-1">
            Меня зовут Евгений, на момент 2026 года я учусь на специальности программиста второго курса, изучаю язык PHP, что поможет мне изучить другие языки из семейства C.
        </div>
        
        <div class="page" id="page-2">
            <h2>Мой список задач</h2>
            <div class="todo-container">
                <input type="text" id="todo-input" placeholder="Введите текст пазязюста">
                <button id="todo-add-btn">Ввести</button>
            </div>
            <ul id="todo-list"></ul>
        </div>

        <div class="page" id="page-3">
            <h2>Запрос к API</h2>
            <p>Нажмите кнопку ниже, чтобы получить случайный цвет с сервера:</p>
            <button id="fetch-button">Получить случайный цвет</button>
            <div id="api-result">Данные не загружены</div>
        </div>
    </main>
    <script>
        document.querySelectorAll('button[data-group]').forEach(button => {
            button.onclick = event => {
                document.querySelectorAll('.page').forEach(page => {
                    page.classList.remove('show');
                });
                const targetId = event.currentTarget.dataset.target;
                document.getElementById(targetId).classList.add('show');
            };
        });

        document.addEventListener('DOMContentLoaded', () => {
            const todoInput = document.getElementById('todo-input');
            const todoAddBtn = document.getElementById('todo-add-btn');
            const todoList = document.getElementById('todo-list');

            if (todoAddBtn && todoInput && todoList) {
                const addTodo = () => {
                    const text = todoInput.value.trim();
                    if (!text) return;

                    const li = document.createElement('li');
                    li.className = 'todo-item';
                    li.innerHTML = `
                        <span>${text}</span>
                        <button class="todo-delete-btn">Удалить</button>
                    `;

                    li.querySelector('.todo-delete-btn').addEventListener('click', () => {
                        li.remove();
                    });

                    todoList.appendChild(li);
                    todoInput.value = '';
                    todoInput.focus();
                };

                todoAddBtn.addEventListener('click', addTodo);

                todoInput.addEventListener('keydown', (event) => {
                    if (event.key === 'Enter') {
                        addTodo();
                    }
                });
            }
        });

        const fetchRandomColor = () => {
            const resultDiv = document.getElementById('api-result');

            if (!resultDiv) {
                console.error('Элемент #api-result не найден в разметке');
                return;
            }

            resultDiv.textContent = 'Загрузка...';

            fetch('yurace.pro')
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP error! Status: ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    let displayText = '<strong>Полученные данные:</strong><br>';

                    if (data.color || data.name) {
                        const colorName = data.color || data.name;
                        displayText += `Цвет: <span style="color: ${colorName}; font-weight: bold;">${colorName}</span><br>`;
                    }

                    if (data.hex) {
                        displayText += `HEX: <code>${data.hex}</code><br>`;
                    }

                    if (Array.isArray(data.rgb)) {
                        displayText += `RGB: <code>rgb(${data.rgb.join(', ')})</code><br>`;
                    } else if (data.rgb) {
                        displayText += `RGB: <code>${data.rgb}</code><br>`;
                    }

                    if (displayText === '<strong>Полученные данные:</strong><br>') {
                        displayText = 'Получены данные, но их структура неизвестна:<br>' + JSON.stringify(data, null, 2);
                    }

                    resultDiv.innerHTML = displayText;
                })
                .catch(error => {
                    console.error('Ошибка при запросе:', error);
                    resultDiv.textContent = `Ошибка: ${error.message}`;
                });
        };

        document.addEventListener('DOMContentLoaded', () => {
            const fetchButton = document.getElementById('fetch-button');

            if (fetchButton) {
                fetchButton.addEventListener('click', fetchRandomColor);
            } else {
                console.error('Кнопка #fetch-button не найдена в разметке');
            }
        });
    </script>
</body>
</html>
