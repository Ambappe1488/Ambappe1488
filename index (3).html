<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }

        header {
            background-color: #4a76a8;
            padding: 15px 0;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        hav {
            display: flex;
            justify-content: center;
            gap: 15px;
            align-items: center;
        }

        button[data-group] {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #6c9bc0;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button[data-group]:hover {
            background-color: #5a8bb3;
        }

        main {
            max-width: 800px;
            margin: 30px auto;
            background-color: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .page {
            display: none;
            padding: 20px;
        }

        .page.show {
            display: block;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        #page-1 {
            text-align: center;
            font-size: 18px;
        }

        #page-2 input {
            padding: 12px;
            width: 100%;
            max-width: 300px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
        }

        #page-2 button {
            padding: 12px 24px;
            background-color: #4a76a8;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s ease;
            align-self: flex-start;
        }

        #page-2 button:hover {
            background-color: #3a6592;
        }

        #page-3 {
            text-align: center;
            font-style: italic;
            color: #666;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <header>
        <hav>
            <button data-group=".page" data-target="page-1"> О себе</button>
            <button data-group=".page" data-target="page-2">чо нибуть</button>
            <button data-group=".page" data-target="page-3">Мои работы</button>
        </hav>
    </header>
    <main>
        <div class="page show" id="page-1">
            Меня зовут Евгений, на момент 2026 года, я учусь на специальности программиста второго курса, изучаю язык PHP, что поможет мне изучить другие языки из семейства C.
        </div>
        <div class="page" id="page-2">
            <input type="text" placeholder="Введите текст пазязюста">
            <button>Ввести</button>
        </div>
        <div class="page" id="page-3">
            а
        </div>
    </main>
    <script>
        document.querySelectorAll('button[data-group]').forEach(button => {
            button.onclick = event => {

                document.querySelectorAll('.page').forEach(page => {
                    page.classList.remove('show');
                });

                const targetId = event.currentTarget.dataset.target;
                document.getElementById(targetId).classList.add('show');
            };
        });
    </script>
</body>
</html>
